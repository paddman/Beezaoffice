<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">BeezaOffice Agent Room placeholder</title>
  <desc id="desc">A clean electric-blue office mockup to replace with a custom Agent Room image.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e7f1ff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9ebff" stop-opacity=".82"/>
      <stop offset="1" stop-color="#a7ccff" stop-opacity=".35"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#173b69"/>
      <stop offset="1" stop-color="#245a9f"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#173b69" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
