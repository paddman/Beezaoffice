  <rect x="1270" y="354" width="520" height="276" rx="30" fill="#fbfdff" stroke="#dce9f7" stroke-width="4"/>
  <rect x="1310" y="397" width="300" height="22" rx="11" fill="#1268ff" opacity=".18"/>
  <rect x="1310" y="447" width="420" height="17" rx="8" fill="#9fb7d3" opacity=".36"/>
