name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python source
        run: >-
          python -m py_compile
          app/main.py
          app/phase2_app.py
          app/phase3_app.py
          app/phase4_app.py
          app/phase5_app.py
          app/phase6_app.py
          app/phase6_runtime.py
          app/phase7_app.py
          app/phase7_runtime.py
          app/phase8_app.py
          app/phase8_runtime.py
          app/phase9_app.py
          app/phase9_runtime.py
          app/phase10_app.py
          app/phase10_runtime.py
          app/phase11_app.py
          app/phase11_runtime.py
          app/phase11_bootstrap.py
          app/collaboration_models.py
          app/collaboration_service.py
          app/meeting_models.py
          app/meeting_service.py
          app/governance_models.py
          app/governance_service.py
          app/governance_hardening.py
          app/registry_models.py
          app/registry_service.py
          app/scheduler_models.py
          app/scheduler_service.py
          app/evaluation_models.py
          app/evaluation_service.py
          app/evaluation_hardening.py
          app/evaluation_startup_fix.py
          app/sop_models.py
          app/sop_service.py
          app/sop_hardening.py
          app/protocol_models.py
          app/protocol_service.py
          app/runtime_adapters.py
      - name: Check browser JavaScript
        run: |
          node --check app/static/app.js
          node --check app/static/phase3.js
          node --check app/static/phase4.js
          node --check app/static/phase5.js
          node --check app/static/phase6_bootstrap.js
          node --check app/static/phase6.js
          node --check app/static/phase7.js
          node --check app/static/phase8.js
          node --check app/static/phase9.js
          node --check app/static/phase10.js
          node --check app/static/phase11.js
      - name: Build application image
        run: docker build -t beezaoffice:test ./app
      - name: Smoke-test Phase 11 protocol gateway
        run: |
          docker run --rm beezaoffice:test python -c "from phase11_bootstrap import app; from phase11_app import agent_card, mcp_tools, A2A_VERSION, MCP_PROTOCOL_VERSION; from protocol_models import ProtocolTask, ProtocolEvent, WebhookReceipt, A2ASendRequest; from protocol_service import COLLAB_TO_A2A_STATE, webhook_digest; from governance_service import permission_for_request, EXECUTION_ACTIONS; sample=A2ASendRequest.model_validate({'message':{'messageId':'m1','role':'ROLE_USER','parts':[{'text':'Investigate service latency and return verified evidence.'}]},'configuration':{'returnImmediately':True}}); card=agent_card(True); paths=[getattr(route,'path',None) for route in app.router.routes]; assert app.version == '0.12.0'; assert ProtocolTask.__tablename__ == 'protocol_tasks'; assert ProtocolEvent.__tablename__ == 'protocol_events'; assert WebhookReceipt.__tablename__ == 'protocol_webhook_receipts'; assert sample.configuration.returnImmediately is True; assert card['protocolVersion'] == '1.0' and card['capabilities']['streaming'] is True; assert A2A_VERSION == '1.0' and MCP_PROTOCOL_VERSION == '2025-06-18'; assert len(mcp_tools()) == 4; assert COLLAB_TO_A2A_STATE['COMPLETED'] == 'TASK_STATE_COMPLETED'; assert len(webhook_digest(b'beeza')) == 64; assert paths.index('/tasks/{task_id}:subscribe') < paths.index('/tasks/{task_id}'); assert permission_for_request('POST', '/api/protocol/tick') == 'protocol:operate'; assert 'protocol:use' in EXECUTION_ACTIONS"
