name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python source
        run: >-
          python -m py_compile
          app/main.py
          app/phase2_app.py
          app/phase3_app.py
          app/phase4_app.py
          app/phase5_app.py
          app/phase6_app.py
          app/phase6_runtime.py
          app/phase7_app.py
          app/phase7_runtime.py
          app/phase8_app.py
          app/phase8_runtime.py
          app/phase9_app.py
          app/phase9_runtime.py
          app/phase10_app.py
          app/phase10_runtime.py
          app/collaboration_models.py
          app/collaboration_service.py
          app/meeting_models.py
          app/meeting_service.py
          app/governance_models.py
          app/governance_service.py
          app/governance_hardening.py
          app/registry_models.py
          app/registry_service.py
          app/scheduler_models.py
          app/scheduler_service.py
          app/evaluation_models.py
          app/evaluation_service.py
          app/evaluation_hardening.py
          app/evaluation_startup_fix.py
          app/sop_models.py
          app/sop_service.py
          app/sop_hardening.py
          app/runtime_adapters.py
      - name: Check browser JavaScript
        run: |
          node --check app/static/app.js
          node --check app/static/phase3.js
          node --check app/static/phase4.js
          node --check app/static/phase5.js
          node --check app/static/phase6_bootstrap.js
          node --check app/static/phase6.js
          node --check app/static/phase7.js
          node --check app/static/phase8.js
          node --check app/static/phase9.js
          node --check app/static/phase10.js
      - name: Build application image
        run: docker build -t beezaoffice:test ./app
      - name: Smoke-test Phase 10 SOP runtime
        run: |
          docker run --rm beezaoffice:test python -c "from phase10_runtime import app; from sop_models import SOPDefinition, SOPNodeDefinition, SOPTemplate, SOPVersion, SOPRun, SOPNodeRun; from sop_service import canonical_checksum, validate_definition, topological_order; from sop_hardening import hardened_sync_task_node, fair_sop_tick; from governance_service import permission_for_request, EXECUTION_ACTIONS; definition=SOPDefinition(nodes=[SOPNodeDefinition(key='collect', title='Collect evidence', objective='Collect enough verified evidence for the requested change.', verification_required=True), SOPNodeDefinition(key='approve', title='Approve change', node_type='APPROVAL', depends_on=['collect'], objective='Approve the evidence-backed change.', verification_required=False), SOPNodeDefinition(key='execute', title='Execute change', depends_on=['approve'], objective='Execute the approved change and preserve verification evidence.', verification_required=True)]); checked=validate_definition(definition); assert app.version == '0.11.0'; assert SOPTemplate.__tablename__ == 'sop_templates'; assert SOPVersion.__tablename__ == 'sop_versions'; assert SOPRun.__tablename__ == 'sop_runs'; assert SOPNodeRun.__tablename__ == 'sop_node_runs'; assert topological_order(checked) == ['collect','approve','execute']; assert canonical_checksum({'b':2,'a':1}) == canonical_checksum({'a':1,'b':2}); assert callable(hardened_sync_task_node) and callable(fair_sop_tick); assert permission_for_request('POST', '/api/sop/templates/demo/runs') == 'sop:run'; assert permission_for_request('POST', '/api/sop/runs/RUN-1/nodes/approve/decision') == 'sop:approve'; assert 'sop:run' in EXECUTION_ACTIONS and 'sop:approve' in EXECUTION_ACTIONS"
