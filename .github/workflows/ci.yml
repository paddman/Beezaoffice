name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python source
        run: |
          find app tests deploy/license deploy/pilot -type f -name '*.py' -print0 \
            | xargs -0 python -m py_compile

      - name: Check browser JavaScript
        run: |
          find app/static -maxdepth 1 -type f -name '*.js' -print0 \
            | xargs -0 -n1 node --check

      - name: Check deployment scripts and Compose files
        run: |
          sh -n deploy/backup/run-backup.sh
          sh -n deploy/backup/restore-backup.sh
          sh -n deploy/install/install.sh
          touch deploy/install/.env
          docker compose -f deploy/install/compose.production.yml config >/dev/null
          rm -f deploy/install/.env
          docker compose -f deploy/pilot/compose.yml config >/dev/null
        env:
          BEEZA_IMAGE: ghcr.io/paddman/beezaoffice@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          BEEZA_APP_VERSION: 0.16.0
          BEEZA_RELEASE_CHANNEL: pilot
          DATABASE_URL: postgresql+psycopg://beeza:test@postgres:5432/beezaoffice
          REDIS_URL: redis://redis:6379/0
          BEEZA_AUTH_TOKEN: test
          BEEZA_METRICS_TOKEN: test
          BEEZA_DEPLOYMENT_ID: deployment:test
          POSTGRES_DB: beezaoffice
          POSTGRES_USER: beeza
          POSTGRES_PASSWORD: test

      - name: Build application image
        run: docker build -t beezaoffice:test ./app

      - name: Validate Alembic revision graph
        run: |
          docker run --rm beezaoffice:test alembic -c alembic.ini heads
          test "$(docker run --rm beezaoffice:test alembic -c alembic.ini heads | awk '{print $1}')" = "20260722_0002"

      - name: Verify signed-license cryptography
        run: docker run --rm beezaoffice:test python phase14_selftest.py

      - name: Smoke-test 0.16.0 Pilot Operations runtime
        run: |
          docker run --rm \
            -v "$PWD/tests:/tests:ro" \
            beezaoffice:test python /tests/pilot_smoke.py

      - name: Verify Pilot utilities load
        run: |
          python tests/pilot_load.py --help >/dev/null
          python tests/pilot_security.py --help >/dev/null
          python tests/pilot_runtime_e2e.py --help >/dev/null
          python tests/pilot_customer_acceptance.py --help >/dev/null
          python tests/pilot_record_gate.py --help >/dev/null
          docker run --rm \
            -v "$PWD/deploy/pilot:/pilot:ro" \
            beezaoffice:test python /pilot/prepare_license.py --help >/dev/null

      - name: Generate SPDX dependency inventory
        run: |
          docker run --rm beezaoffice:test python -c "import importlib.metadata as m,json; packages=sorted([{'name':d.metadata.get('Name',d.metadata.get('Summary','unknown')),'version':d.version} for d in m.distributions()],key=lambda x:x['name'].lower()); print(json.dumps({'spdxVersion':'SPDX-2.3','dataLicense':'CC0-1.0','SPDXID':'SPDXRef-DOCUMENT','name':'BeezaOffice-0.16.0-Python-Dependencies','documentNamespace':'https://beezaoffice.local/sbom/python/0.16.0','packages':[{'SPDXID':'SPDXRef-Package-'+str(i),'name':p['name'],'versionInfo':p['version'],'downloadLocation':'NOASSERTION','filesAnalyzed':False} for i,p in enumerate(packages)]},indent=2))" > sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: beezaoffice-0.16.0-sbom
          path: sbom.spdx.json
