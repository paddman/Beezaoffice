name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python source
        run: >-
          python -m py_compile
          app/main.py
          app/phase2_app.py
          app/phase3_app.py
          app/phase4_app.py
          app/phase5_app.py
          app/phase6_app.py
          app/phase6_runtime.py
          app/phase7_app.py
          app/phase7_runtime.py
          app/phase8_app.py
          app/phase8_runtime.py
          app/collaboration_models.py
          app/collaboration_service.py
          app/meeting_models.py
          app/meeting_service.py
          app/governance_models.py
          app/governance_service.py
          app/governance_hardening.py
          app/registry_models.py
          app/registry_service.py
          app/scheduler_models.py
          app/scheduler_service.py
          app/runtime_adapters.py
      - name: Check browser JavaScript
        run: |
          node --check app/static/app.js
          node --check app/static/phase3.js
          node --check app/static/phase4.js
          node --check app/static/phase5.js
          node --check app/static/phase6_bootstrap.js
          node --check app/static/phase6.js
          node --check app/static/phase7.js
          node --check app/static/phase8.js
      - name: Build application image
        run: docker build -t beezaoffice:test ./app
      - name: Smoke-test Phase 8 intelligent scheduler
        run: |
          docker run --rm beezaoffice:test python -c "from phase8_runtime import app; from collaboration_models import CollaborationTask; from scheduler_models import SchedulerPolicy, RoutingDecision, RoutedTaskCreate; from scheduler_service import estimate_cost, task_needs_route; from governance_service import permission_for_request; policy=SchedulerPolicy(policy_key='p', name='p', enabled=True, weights={}, runtime_limits={}, runtime_cost_per_1k_tokens={'hermes':0.01}, default_token_estimate=4000, minimum_score=0.3, minimum_skill_coverage=0.5, max_route_attempts=5, retry_seconds=30, settings={}, created_by='test'); task=CollaborationTask(target_identity='agent:auto', target_runtime_key='auto', context={'routing_mode':'AUTO'}); sample=RoutedTaskCreate(title='Route work', objective='Choose the best available governed agent for this task.'); assert app.version == '0.9.0'; assert SchedulerPolicy.__tablename__ == 'scheduler_policies'; assert RoutingDecision.__tablename__ == 'routing_decisions'; assert sample.routing_mode == 'AUTO'; assert estimate_cost(policy, 'hermes', 4000) == 0.04; assert task_needs_route(task); assert permission_for_request('POST', '/api/missions/INC-1/routed-tasks') == 'scheduler:route'"
