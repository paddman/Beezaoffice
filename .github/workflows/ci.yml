name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python source
        run: python -m py_compile app/main.py app/runtime_adapters.py
      - name: Check browser JavaScript
        run: node --check app/static/app.js
      - name: Build application image
        run: docker build -t beezaoffice:test ./app
