name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python source
        run: >-
          python -m py_compile
          app/main.py
          app/phase2_app.py
          app/phase3_app.py
          app/phase4_app.py
          app/phase5_app.py
          app/phase6_app.py
          app/phase6_runtime.py
          app/phase7_app.py
          app/phase7_runtime.py
          app/phase8_app.py
          app/phase8_runtime.py
          app/phase9_app.py
          app/phase9_runtime.py
          app/collaboration_models.py
          app/collaboration_service.py
          app/meeting_models.py
          app/meeting_service.py
          app/governance_models.py
          app/governance_service.py
          app/governance_hardening.py
          app/registry_models.py
          app/registry_service.py
          app/scheduler_models.py
          app/scheduler_service.py
          app/evaluation_models.py
          app/evaluation_service.py
          app/runtime_adapters.py
      - name: Check browser JavaScript
        run: |
          node --check app/static/app.js
          node --check app/static/phase3.js
          node --check app/static/phase4.js
          node --check app/static/phase5.js
          node --check app/static/phase6_bootstrap.js
          node --check app/static/phase6.js
          node --check app/static/phase7.js
          node --check app/static/phase8.js
          node --check app/static/phase9.js
      - name: Build application image
        run: docker build -t beezaoffice:test ./app
      - name: Smoke-test Phase 9 evaluation runtime
        run: |
          docker run --rm beezaoffice:test python -c "from phase9_runtime import app; from evaluation_models import EvaluationPolicy, EvaluationRun, EvidenceRecord, ReplayRun, ReplayCreate; from evaluation_service import canonical_hash, normalized_weights; from governance_service import permission_for_request, EXECUTION_ACTIONS; policy=EvaluationPolicy(policy_key='p', name='p', enabled=True, weights={'evidence':1.0}, pass_score=0.8, warn_score=0.5, minimum_evidence=2, require_provenance=True, require_acceptance_coverage=True, reopen_failed_auto_tasks=True, settings={}, created_by='test'); sample=ReplayCreate(source_task_key='TASK-1', mode='REROUTE', reason='Verify the result using a different governed route.'); assert app.version == '0.10.0'; assert EvaluationRun.__tablename__ == 'evaluation_runs'; assert EvidenceRecord.__tablename__ == 'evaluation_evidence'; assert ReplayRun.__tablename__ == 'evaluation_replays'; assert sample.mode == 'REROUTE'; assert canonical_hash({'b':2,'a':1}) == canonical_hash({'a':1,'b':2}); assert normalized_weights(policy)['evidence'] > 0; assert permission_for_request('POST', '/api/evaluation/tasks/TASK-1') == 'evaluation:run'; assert permission_for_request('POST', '/api/evaluation/replays') == 'replay:create'; assert 'replay:create' in EXECUTION_ACTIONS"
