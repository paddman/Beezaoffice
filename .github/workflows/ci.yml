name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python source
        run: >-
          python -m py_compile
          app/main.py
          app/phase2_app.py
          app/phase3_app.py
          app/phase4_app.py
          app/phase5_app.py
          app/phase6_app.py
          app/phase6_runtime.py
          app/phase7_app.py
          app/phase7_runtime.py
          app/phase8_app.py
          app/phase8_runtime.py
          app/phase9_app.py
          app/phase9_runtime.py
          app/phase10_app.py
          app/phase10_runtime.py
          app/phase11_app.py
          app/phase11_runtime.py
          app/phase11_security.py
          app/phase11_hardening.py
          app/phase11_bootstrap.py
          app/phase12_app.py
          app/phase12_runtime.py
          app/phase12_hardening.py
          app/phase12_isolation.py
          app/phase12_bootstrap.py
          app/collaboration_models.py
          app/collaboration_service.py
          app/meeting_models.py
          app/meeting_service.py
          app/governance_models.py
          app/governance_service.py
          app/governance_hardening.py
          app/registry_models.py
          app/registry_service.py
          app/scheduler_models.py
          app/scheduler_service.py
          app/evaluation_models.py
          app/evaluation_service.py
          app/evaluation_hardening.py
          app/evaluation_startup_fix.py
          app/sop_models.py
          app/sop_service.py
          app/sop_hardening.py
          app/protocol_models.py
          app/protocol_service.py
          app/enterprise_models.py
          app/enterprise_service.py
          app/runtime_adapters.py
      - name: Check browser JavaScript
        run: |
          node --check app/static/app.js
          node --check app/static/phase3.js
          node --check app/static/phase4.js
          node --check app/static/phase5.js
          node --check app/static/phase6_bootstrap.js
          node --check app/static/phase6.js
          node --check app/static/phase7.js
          node --check app/static/phase8.js
          node --check app/static/phase9.js
          node --check app/static/phase10.js
          node --check app/static/phase11.js
          node --check app/static/phase12.js
      - name: Build application image
        run: docker build -t beezaoffice:test ./app
      - name: Smoke-test Phase 12 enterprise runtime
        run: |
          docker run --rm beezaoffice:test python -c "from phase12_bootstrap import app; from phase12_hardening import enterprise_permission_for_request, hardened_verify_oidc_token; from enterprise_models import EnterpriseTenant, IdentityProvider, EnterpriseSession, EnterpriseApiKey, ResourceScope, BackupPlan, BackupRun, SIEMSink; from enterprise_service import token_hash, DEFAULT_TENANT; from governance_service import permission_for_request, EXECUTION_ACTIONS; paths=[getattr(route,'path',None) for route in app.router.routes]; assert app.version == '0.13.0'; assert EnterpriseTenant.__tablename__ == 'enterprise_tenants'; assert IdentityProvider.__tablename__ == 'enterprise_identity_providers'; assert EnterpriseSession.__tablename__ == 'enterprise_sessions'; assert EnterpriseApiKey.__tablename__ == 'enterprise_api_keys'; assert ResourceScope.__tablename__ == 'enterprise_resource_scopes'; assert BackupPlan.__tablename__ == 'enterprise_backup_plans'; assert BackupRun.__tablename__ == 'enterprise_backup_runs'; assert SIEMSink.__tablename__ == 'enterprise_siem_sinks'; assert len(token_hash('beeza')) == 64; assert DEFAULT_TENANT.startswith('tenant:'); assert paths.count('/api/missions') == 2; assert paths.count('/api/registry/agents') == 1; assert paths.count('/api/collaboration/tasks') == 1; assert paths.count('/api/sop/templates') == 1; assert paths.count('/api/protocol/events') == 1; assert '/health/ready' in paths and '/metrics' in paths; assert enterprise_permission_for_request('POST','/message:send') == 'protocol:use'; assert callable(hardened_verify_oidc_token); assert permission_for_request('POST', '/api/enterprise/backup/plans/demo/runs') == 'enterprise:backup:run'; assert 'enterprise:backup:run' in EXECUTION_ACTIONS"
      - name: Generate SPDX dependency inventory
        run: |
          docker run --rm beezaoffice:test python -c "import importlib.metadata as m,json; packages=sorted([{'name':d.metadata.get('Name',d.metadata.get('Summary','unknown')),'version':d.version} for d in m.distributions()],key=lambda x:x['name'].lower()); print(json.dumps({'spdxVersion':'SPDX-2.3','dataLicense':'CC0-1.0','SPDXID':'SPDXRef-DOCUMENT','name':'BeezaOffice-Python-Dependencies','documentNamespace':'https://beezaoffice.local/sbom/python','packages':[{'SPDXID':'SPDXRef-Package-'+str(i),'name':p['name'],'versionInfo':p['version'],'downloadLocation':'NOASSERTION','filesAnalyzed':False} for i,p in enumerate(packages)]},indent=2))" > sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: beezaoffice-sbom
          path: sbom.spdx.json
