name: Deploy Signed Pilot

on:
  workflow_dispatch:
    inputs:
      host:
        description: Pilot Ubuntu host or IP
        required: true
        type: string
      ssh_user:
        description: SSH user with Docker access or passwordless sudo
        required: true
        default: ubuntu
        type: string
      ssh_port:
        description: SSH port
        required: true
        default: "22"
        type: string
      image:
        description: Signed digest-pinned RC image
        required: true
        type: string
      cosign_identity:
        description: Expected GitHub OIDC certificate identity
        required: true
        type: string
      public_url:
        description: HTTPS Pilot URL used for readiness verification
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pilot-production
    env:
      PILOT_HOST: ${{ inputs.host }}
      PILOT_USER: ${{ inputs.ssh_user }}
      PILOT_PORT: ${{ inputs.ssh_port }}
      BEEZA_IMAGE: ${{ inputs.image }}
      BEEZA_COSIGN_IDENTITY: ${{ inputs.cosign_identity }}
      BEEZA_PUBLIC_URL: ${{ inputs.public_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate immutable release inputs
        run: |
          case "$BEEZA_IMAGE" in
            *@sha256:*) ;;
            *) echo "Image must be digest pinned" >&2; exit 1 ;;
          esac
          case "$BEEZA_PUBLIC_URL" in
            https://*) ;;
            *) echo "Pilot public URL must use HTTPS" >&2; exit 1 ;;
          esac
          test -n "${{ secrets.PILOT_SSH_PRIVATE_KEY }}"
          test -n "${{ secrets.PILOT_SSH_KNOWN_HOSTS }}"
          test -n "${{ secrets.PILOT_ENV_B64 }}"

      - name: Prepare pinned SSH trust and protected environment
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PILOT_SSH_PRIVATE_KEY }}" > ~/.ssh/pilot_key
          printf '%s\n' "${{ secrets.PILOT_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/pilot_key ~/.ssh/known_hosts
          ssh-keygen -F "$PILOT_HOST" -f ~/.ssh/known_hosts >/dev/null \
            || ssh-keygen -F "[$PILOT_HOST]:$PILOT_PORT" -f ~/.ssh/known_hosts >/dev/null
          printf '%s' "${{ secrets.PILOT_ENV_B64 }}" | base64 --decode > pilot.env
          chmod 600 pilot.env
          grep -q '^BEEZA_APP_VERSION=0.16.1$' pilot.env
          grep -q '^BEEZA_RELEASE_CHANNEL=pilot$' pilot.env
          grep -q '^BEEZA_LICENSE_MODE=enforce$' pilot.env
          grep -q '^BEEZA_LICENSE_TOKEN=.' pilot.env
          grep -q '^BEEZA_LICENSE_PUBLIC_KEY=.' pilot.env
          grep -q '^BEEZA_SCHEMA_STRICT=true$' pilot.env
          grep -q '^BEEZA_FORCE_HTTPS=true$' pilot.env

      - name: Upload installer bundle
        run: |
          ssh -i ~/.ssh/pilot_key -p "$PILOT_PORT" "$PILOT_USER@$PILOT_HOST" \
            'mkdir -p ~/beezaoffice-0.16.1/deploy/install'
          scp -i ~/.ssh/pilot_key -P "$PILOT_PORT" \
            deploy/install/install.sh \
            deploy/install/compose.production.yml \
            "$PILOT_USER@$PILOT_HOST:~/beezaoffice-0.16.1/deploy/install/"
          scp -i ~/.ssh/pilot_key -P "$PILOT_PORT" \
            pilot.env \
            "$PILOT_USER@$PILOT_HOST:~/beezaoffice-0.16.1/pilot.env"

      - name: Verify and install signed image on Pilot host
        run: |
          ssh -i ~/.ssh/pilot_key -p "$PILOT_PORT" "$PILOT_USER@$PILOT_HOST" \
            "BEEZA_IMAGE='$BEEZA_IMAGE' BEEZA_COSIGN_IDENTITY='$BEEZA_COSIGN_IDENTITY' BEEZA_PUBLIC_URL='$BEEZA_PUBLIC_URL' sh -s" <<'REMOTE'
          set -eu
          command -v docker >/dev/null
          command -v cosign >/dev/null
          SUDO=""
          if ! docker info >/dev/null 2>&1 || [ ! -w /opt ]; then
            sudo -n true >/dev/null
            SUDO="sudo"
          fi
          install_dir=/opt/beezaoffice
          $SUDO install -d -m 700 "$install_dir"
          $SUDO cp ~/beezaoffice-0.16.1/pilot.env "$install_dir/.env"
          $SUDO chmod 600 "$install_dir/.env"
          $SUDO env \
            BEEZA_INSTALL_DIR="$install_dir" \
            BEEZA_APP_VERSION=0.16.1 \
            BEEZA_RELEASE_CHANNEL=pilot \
            BEEZA_IMAGE="$BEEZA_IMAGE" \
            BEEZA_COSIGN_IDENTITY="$BEEZA_COSIGN_IDENTITY" \
            BEEZA_COSIGN_ISSUER=https://token.actions.githubusercontent.com \
            BEEZA_PUBLIC_URL="$BEEZA_PUBLIC_URL" \
            sh ~/beezaoffice-0.16.1/deploy/install/install.sh
          REMOTE

      - name: Verify remote readiness and version
        run: |
          python - <<'PY'
          import json, os, time, urllib.request
          base = os.environ["BEEZA_PUBLIC_URL"].rstrip("/")
          deadline = time.monotonic() + 180
          last = None
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen(base + "/health/ready", timeout=10) as response:
                      ready = json.load(response)
                  with urllib.request.urlopen(base + "/api/health", timeout=10) as response:
                      health = json.load(response)
                  assert ready["status"] == "ready", ready
                  assert health["version"] == "0.16.1", health
                  assert health["license_mode"] == "enforce", health
                  print(json.dumps({"ready": ready, "health": health}, indent=2))
                  break
              except Exception as exc:
                  last = exc
                  time.sleep(5)
          else:
              raise SystemExit(f"Pilot deployment did not become ready: {last}")
          PY

      - name: Remove local deployment secrets
        if: always()
        run: rm -f pilot.env ~/.ssh/pilot_key ~/.ssh/known_hosts
