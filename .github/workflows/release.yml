name: Signed Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/paddman/beezaoffice
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign immutable image digest with GitHub OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -eu
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "$tag@$DIGEST"
          done

      - name: Verify signed image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -eu
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign verify \
              --certificate-identity "$identity" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$tag@$DIGEST" >/dev/null
          done

      - name: Create commercial release manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -eu
          primary_tag="$(printf '%s\n' "$TAGS" | head -n 1)"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          python - <<'PY'
          import json, os
          tag = os.environ["TAGS"].splitlines()[0]
          digest = os.environ["DIGEST"]
          manifest = {
              "version": os.environ["GITHUB_REF_NAME"].removeprefix("v"),
              "channel": "stable",
              "image_ref": tag,
              "image_digest": digest,
              "signature_ref": f"oci://{tag}@{digest}",
              "sbom_ref": f"oci://{tag}@{digest}#sbom",
              "provenance_ref": f"oci://{tag}@{digest}#provenance",
              "minimum_plan": "plan:team",
              "notes": "Signed BeezaOffice commercial release generated by GitHub Actions.",
              "source_commit": os.environ["GITHUB_SHA"],
              "certificate_identity": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/.github/workflows/release.yml@refs/tags/{os.environ['GITHUB_REF_NAME']}",
              "certificate_oidc_issuer": "https://token.actions.githubusercontent.com",
              "metadata": {
                  "schema": "beezaoffice.release/v1",
                  "sbom": "OCI build attestation",
                  "provenance": "SLSA build provenance attestation",
              },
          }
          with open("release-manifest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2, sort_keys=True)
          PY
          sha256sum release-manifest.json > release-manifest.sha256
          cat > INSTALL.txt <<EOF
          BEEZA_IMAGE=${primary_tag}@${DIGEST} \\
          BEEZA_COSIGN_IDENTITY=${identity} \\
          sh deploy/install/install.sh

          Register the verified manifest with:
          curl -X POST \\
            -H "Authorization: Bearer \$BEEZA_AUTH_TOKEN" \\
            -H "X-Beeza-Identity: service:enterprise" \\
            -H "Content-Type: application/json" \\
            --data @release-manifest.json \\
            "\$BEEZA_PUBLIC_URL/api/commercial/releases/publish"
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: beezaoffice-${{ github.ref_name }}-commercial-release
          path: |
            release-manifest.json
            release-manifest.sha256
            INSTALL.txt
          if-no-files-found: error
